name: Purge Empty Categories

on:
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DJANGO_SETTINGS_MODULE: LSuite.settings

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Purge empty placeholder categories
        run: |
          python manage.py shell << 'EOF'
          from apps.main.models import TransactionCategory

          to_delete = TransactionCategory.objects.filter(
              keywords__isnull=True,
              transactions__isnull=True,
          ) | TransactionCategory.objects.filter(
              keywords='',
              transactions__isnull=True,
          )

          # Deduplicate (union can produce dupes)
          to_delete = TransactionCategory.objects.filter(
              id__in=to_delete.values_list('id', flat=True)
          )

          print(f"Found {to_delete.count()} categories to delete:")
          for c in to_delete:
              print(f"  [{c.id}] {c.name}")

          deleted, _ = to_delete.delete()
          print(f"\nDeleted {deleted} categories.")
          EOF