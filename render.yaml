services:
  - type: web
    name: lsuite
    plan: free
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py makemigrations && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn LSuite.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "True"
      - key: GH_TOKEN
        value: "ghp_EXAMPLEOFGHFULLTOKENHERE"
      - key: GH_REPO
        value: "MrViincciLeRoy/L-Suite"
      - key: DATABASE_URL
        value: "mysql"
      - key: DB_PASSWORD
        sync: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
