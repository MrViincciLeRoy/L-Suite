{% if job.status == 'done' %}
    <span class="badge bg-success"><i class="fas fa-check"></i> Done</span>
{% elif job.status == 'processing' %}
    <span class="badge bg-primary"><i class="fas fa-spinner fa-spin"></i> Processing</span>
{% elif job.status == 'pending' %}
    <span class="badge bg-secondary"><i class="fas fa-clock"></i> Pending</span>
{% else %}
    <span class="badge bg-danger"><i class="fas fa-times"></i> Failed</span>
{% endif %}
