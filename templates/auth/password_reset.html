{% extends "base.html" %}
{% block title %}Reset Password - LSuite{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow">
      <div class="card-body p-5">
        <h3 class="text-center mb-2">
          <i class="fas fa-key text-primary"></i>
        </h3>
        <h4 class="text-center mb-1">Reset Password</h4>
        <p class="text-center text-muted small mb-4">
          Enter your email and we'll send you a reset link.
        </p>
        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" required autofocus placeholder="you@example.com">
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Send Reset Link</button>
          </div>
        </form>
        <hr class="my-3">
        <p class="text-center text-muted small mb-0">
          <a href="{% url 'authusers:login' %}">← Back to Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
